<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>摩托麻吉 — 內容工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Password Gate -->
  <div id="password-gate">
    <div class="gate-box">
      <span class="gate-logo">🗺️</span>
      <h2>摩托麻吉內容工具</h2>
      <p>請輸入密碼</p>
      <input type="password" id="gate-input" placeholder="密碼" autofocus>
      <button id="gate-submit">進入</button>
      <p id="gate-error" class="hidden">密碼錯誤</p>
    </div>
  </div>

  <!-- Hub -->
  <div id="hub" class="hidden">
    <div class="hub-container">
      <div class="hub-header">
        <span class="hub-logo">🗺️</span>
        <h1>摩托麻吉</h1>
        <p>內容策略工具</p>
      </div>
      <div class="hub-grid">
        <a href="product.html" class="hub-card">
          <span class="hub-card-icon">📦</span>
          <h2>商品企劃</h2>
          <p>產品開箱、評測、比較<br>購買旅程 × 內容策略</p>
          <span class="hub-card-badge">穩定版</span>
        </a>
        <a href="product-v2.html" class="hub-card">
          <span class="hub-card-icon">🧪</span>
          <h2>商品企劃 v2</h2>
          <p>新架構開發中<br>AI 解讀策略 × 多節點建立</p>
          <span class="hub-card-badge">開發中</span>
        </a>
        <a href="plan.html" class="hub-card">
          <span class="hub-card-icon">🎯</span>
          <h2>內容計劃</h2>
          <p>碎片輸入 → AI 推導完整計劃<br>影片 Brief × 購買旅程覆蓋</p>
          <span class="hub-card-badge">新</span>
        </a>
        <!-- 訪談企劃：暫時封存，功能完成後取消註解即可恢復
        <a href="interview.html" class="hub-card">
          <span class="hub-card-icon">🎤</span>
          <h2>訪談企劃</h2>
          <p>人物故事、專家觀點<br>提問設計 × 訪綱規劃</p>
        </a>
        -->
      </div>
    </div>
  </div>

  <script>
  (function(){
    const HASH = 'c8b9be9de8f449100edeb9693d22b688454283c0406ef19a6ba89e0fa7a5e0f7';
    const gate = document.getElementById('password-gate');
    const hub = document.getElementById('hub');
    if (sessionStorage.getItem('canvas-auth') === 'ok') {
      gate.classList.add('hidden');
      hub.classList.remove('hidden');
    }
    async function check() {
      const pw = document.getElementById('gate-input').value;
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
      if (hash === HASH) {
        sessionStorage.setItem('canvas-auth','ok');
        gate.classList.add('hidden');
        hub.classList.remove('hidden');
      } else {
        document.getElementById('gate-error').classList.remove('hidden');
        document.getElementById('gate-input').value = '';
        document.getElementById('gate-input').focus();
      }
    }
    document.getElementById('gate-submit').addEventListener('click', check);
    document.getElementById('gate-input').addEventListener('keydown', function(e){ if(e.key==='Enter') check(); });
  })();
  </script>
</body>
</html>
